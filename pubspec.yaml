name: erp_app
description: 贸易零售ERP系统 - 安卓APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_screenutil: ^5.9.0
  fluttertoast: ^8.2.4
  cached_network_image: ^3.3.1
  pull_to_refresh: ^2.0.0
  flutter_barcode_scanner: ^2.0.0
  permission_handler: ^10.2.0
  connectivity_plus: ^4.0.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
